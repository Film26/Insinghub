<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InsightHub CRM | Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <i class="fas fa-chart-line"></i>
        <span>InsightHub CRM</span>
      </div>

      <nav>
        <div class="nav-item active" data-view="dashboard">
          <i class="fas fa-gauge-high"></i> Dashboard
        </div>
        <div class="nav-item" data-view="insighthub">
          <i class="fas fa-users"></i> Customer InsightHub
        </div>
        <div class="nav-item" data-view="settings">
          <i class="fas fa-gear"></i> Settings
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          เข้าสู่ระบบเป็น
          <strong id="sidebar-username">-</strong>
          <span class="role-badge" id="sidebar-role">-</span>
        </div>
        <button class="btn logout-btn" id="logout-btn">
          <i class="fas fa-right-from-bracket"></i> ออกจากระบบ
        </button>
      </div>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <div class="topbar-title">
          <h1 id="page-title">Dashboard Overview</h1>
          <p id="page-subtitle">ภาพรวมข้อมูลลูกค้าและยอดขาย</p>
        </div>
        <div class="topbar-actions">
          <input type="text" id="global-search" class="search-bar-input" placeholder="ค้นหาชื่อ/เบอร์โทร...">
          <button class="btn btn-secondary" id="refresh-data-btn"><i class="fas fa-rotate"></i> Refresh</button>
        </div>
      </div>

      <section id="view-dashboard" class="view active"></section>
      <section id="view-insighthub" class="view"></section>
      <section id="view-settings" class="view"></section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/insighthub.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
