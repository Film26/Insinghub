<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ | InsightHub CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-logo">
      <i class="fas fa-chart-line"></i>
      <span>InsightHub CRM</span>
    </div>
    <p class="login-subtitle">เข้าสู่ระบบเพื่อจัดการข้อมูลลูกค้า</p>

    <div class="login-error" id="login-error"></div>

    <form id="login-form">
      <div class="login-field">
        <label for="login-username">ชื่อผู้ใช้</label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" id="login-username" autocomplete="username" required>
        </div>
      </div>
      <div class="login-field">
        <label for="login-password">รหัสผ่าน</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="login-password" autocomplete="current-password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary login-submit" id="login-submit-btn">
        <span id="login-submit-label">เข้าสู่ระบบ</span>
      </button>
    </form>

    <p class="login-footnote">InsightHub CRM &middot; Powered by Google Apps Script</p>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
